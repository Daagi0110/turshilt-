<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>3D Photo Sphere</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{
  overflow:hidden;width:100vw;height:100vh;
  background:radial-gradient(circle at center,#120010 0%,#050505 40%,#000000 100%);
}
#scene{position:absolute;inset:0;}

.profile{position:absolute;top:50%;transform:translateY(-50%);z-index:10;text-align:center;transition:opacity 0.8s ease;}
.left{left:5%;}
.right{right:5%;}
.profile img{
  width:180px;height:180px;border-radius:50%;object-fit:cover;
  border:4px solid #ff4fa3;
  box-shadow:0 0 15px #ff4fa3,0 0 30px #ff4fa3;
  animation:float 4s ease-in-out infinite;
}
.profile h2{margin-top:15px;font-size:30px;color:#ff9ed3;text-shadow:0 0 10px #ff4fa3;}
.profile.hidden{opacity:0;pointer-events:none;}

.centerText{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);text-align:center;z-index:20;pointer-events:none;transition:opacity 0.8s ease;}
.centerText small{display:block;font-size:18px;color:white;margin-bottom:10px;letter-spacing:2px;}
.centerText h1{font-size:55px;color:#ff7ac0;text-shadow:0 0 10px #ff4fa3,0 0 30px #ff4fa3;}
.centerText.hidden{opacity:0;}

#giftContainer{
  position:fixed;inset:0;display:flex;flex-direction:column;
  justify-content:center;align-items:center;background:black;z-index:9999;cursor:pointer;
}
#giftBox{position:relative;width:180px;height:180px;}
.box{
  position:absolute;bottom:0;width:180px;height:120px;
  background:#ff4fa3;border-radius:10px;box-shadow:0 0 40px #ff4fa3;
}
.box::before{content:"";position:absolute;left:50%;top:0;width:20px;height:100%;background:white;transform:translateX(-50%);}
.lid{
  position:absolute;top:25px;width:180px;height:45px;
  background:#ff79c3;border-radius:10px;transform-origin:left center;transition:1s;
  box-shadow:0 0 30px #ff79c3;
}
.lid::before{content:"";position:absolute;left:50%;width:20px;height:100%;background:white;transform:translateX(-50%);}
.giftText{margin-top:40px;font-size:24px;color:white;animation:pulse 1s infinite;}
@keyframes pulse{50%{opacity:.4;}}
.open .lid{transform:rotate(-130deg) translateY(-60px);}
.hideGift{animation:giftFade 1s forwards;}
@keyframes giftFade{to{opacity:0;visibility:hidden;}}
@keyframes float{50%{transform:translateY(-12px);}}

#flashOverlay{
  position:fixed;inset:0;z-index:50;pointer-events:none;
  background:radial-gradient(circle at center, #ff4fa3 0%, transparent 70%);
  opacity:0;transition:opacity 0.3s;
}
</style>
</head>
<body>

<div id="flashOverlay"></div>

<div id="giftContainer">
  <div id="giftBox">
    <div class="lid"></div>
    <div class="box"></div>
  </div>
  <div class="giftText">Дарж нээ ❤️</div>
</div>

<div class="profile left">
  <img src="me.jpg">
  <h2>me</h2>
</div>
<div class="profile right">
  <img src="you.jpg">
  <h2>you</h2>
</div>
<div class="centerText">
  <small>Dating You</small>
  <h1 id="days"></h1>
</div>

<div id="scene"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script>

/* ---- Огноо тоолуур ---- */
const startDate = new Date("2018-12-24");
const days = Math.floor((new Date()-startDate)/(1000*60*60*24));
document.getElementById("days").innerHTML = days + " өдөр";

/* ---- Сэтийн тохиргоо ---- */
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 1, 10000);
camera.position.z = 500;

const renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.getElementById("scene").appendChild(renderer.domElement);

let phase = 0;
let phaseTimer = 0;

/* ---- Арын оддын эффект ---- */
const starGeo = new THREE.BufferGeometry();
const starPos = [];
for(let i=0;i<8000;i++){
  starPos.push((Math.random()-0.5)*5000,(Math.random()-0.5)*5000,(Math.random()-0.5)*5000);
}
starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos,3));
const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({color:0xffffff,size:1.2,transparent:true,opacity:0.8}));
scene.add(stars);

/* ---- Зүрхэн хэлбэрт бөөмс ---- */
function heartPoint(t){
  const x = 16*Math.pow(Math.sin(t),3);
  const y = 13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t);
  return {x:x*11, y:y*11};
}
const COUNT = 5000;
const heartPos = new Float32Array(COUNT*3);
const targets = [];
for(let i=0;i<COUNT;i++){
  const t = Math.random()*Math.PI*2;
  const p = heartPoint(t);
  targets.push({x:p.x, y:p.y, z:(Math.random()-0.5)*60});
  heartPos[i*3+0]=(Math.random()-0.5)*2000;
  heartPos[i*3+1]=(Math.random()-0.5)*2000;
  heartPos[i*3+2]=(Math.random()-0.5)*2000;
}
const heartGeo = new THREE.BufferGeometry();
heartGeo.setAttribute('position', new THREE.BufferAttribute(heartPos,3));
const heartMat = new THREE.PointsMaterial({color:0xff4fa3,size:3,transparent:true,opacity:1});
const heart = new THREE.Points(heartGeo, heartMat);
heart.visible = false;
scene.add(heart);

let formation = 0;

/* ---- 30 ЗУРГИЙГ ЦУЛ БӨМБӨРЦӨГ БОЛГОХ ШИНЭ АЛГОРИТМ ---- */
const mainSphereGroup = new THREE.Group();
scene.add(mainSphereGroup);

const TOTAL_PHOTOS = 30;
const RADIUS = 160;

// Зургуудыг уруугаа харахгүй, гажихгүй байх үүднээс Canvas ашиглан нэг том цул Бөмбөрцөг материал үүсгэнэ
const canvas = document.createElement('canvas');
canvas.width = 2048;
canvas.height = 1024;
const ctx = canvas.getContext('2d');
ctx.fillStyle = "#000";
ctx.fillRect(0, 0, canvas.width, canvas.height);

const mainTexture = new THREE.CanvasTexture(canvas);
const sphereGeo = new THREE.SphereGeometry(RADIUS, 64, 64);
const sphereMat = new THREE.MeshBasicMaterial({map: mainTexture, side: THREE.DoubleSide, transparent: true, opacity: 0});
const finalSphereMesh = new THREE.Mesh(sphereGeo, sphereMat);
finalSphereMesh.visible = false;
mainSphereGroup.add(finalSphereMesh);

// Сарних анимацид зориулсан 30 ширхэг түр зуурын хавтгай зургууд
const scatterGroup = new THREE.Group();
scene.add(scatterGroup);
const scatterMeshes = [];
const loader = new THREE.TextureLoader();

// Бөмбөрцгийг бүтэн дүүргэх сүлжээ (6 үе)
const rows = [2, 5, 8, 8, 5, 2];
let loadedCount = 0;
let imgIndex = 0;

for (let r = 0; r < rows.length; r++) {
  const rowCount = rows[r];
  for (let c = 0; c < rowCount; c++) {
    if (imgIndex >= TOTAL_PHOTOS) break;
    
    const currentIdx = imgIndex;
    const img = new Image();
    img.src = `zurag${currentIdx + 1}.jpg`;
    
    // Бөмбөрцөг дээрх заадасгүй байрлалын тооцоо
    const imgWidth = canvas.width / rowCount;
    const imgHeight = canvas.height / rows.length;
    const imgX = c * imgWidth;
    const imgY = r * imgHeight;
    
    img.onload = function() {
      // 1. Цул бөмбөрцгийн мап дээр зургийг зөв харуулан зурах (Уруугаа харахгүй)
      ctx.drawImage(this, imgX, imgY, imgWidth, imgHeight);
      mainTexture.needsUpdate = true;
      
      // 2. Сарних үеийн тусдаа хавтгайнуудыг үүсгэх
      const pGeo = new THREE.PlaneGeometry(65, 65);
      const pMat = new THREE.MeshBasicMaterial({map: new THREE.Texture(this), side: THREE.DoubleSide});
      pMat.map.needsUpdate = true;
      const pMesh = new THREE.Mesh(pGeo, pMat);
      
      pMesh.position.set((Math.random()-0.5)*1500, (Math.random()-0.5)*1500, (Math.random()-0.5)*1500);
      pMesh.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, 0);
      pMesh.visible = false;
      
      // Эцсийн очих цэг (Бөмбөрцөг гадаргуу дээрх цэг)
      const phi = Math.PI * (r + 0.5) / rows.length;
      const theta = (c / rowCount) * Math.PI * 2;
      pMesh.userData = {
        targetPos: new THREE.Vector3(
          RADIUS * Math.sin(phi) * Math.cos(theta),
          RADIUS * Math.cos(phi),
          RADIUS * Math.sin(phi) * Math.sin(theta)
        )
      };
      
      scatterGroup.add(pMesh);
      scatterMeshes.push(pMesh);
    };
    imgIndex++;
  }
}

const flashEl = document.getElementById("flashOverlay");
function triggerFlash(duration=600){
  flashEl.style.opacity="0.9";
  setTimeout(()=>{ flashEl.style.opacity="0"; }, duration);
}

/* ---- Анимацийн ложик ---- */
function animate(){
  requestAnimationFrame(animate);
  phaseTimer++;

  const hPos = heartGeo.attributes.position.array;

  /* PHASE 1: Зүрх эвлэрэх */
  if(phase===1){
    if(formation < 1){
      formation += 0.003;
      for(let i=0;i<COUNT;i++){
        hPos[i*3+0] += (targets[i].x - hPos[i*3+0])*0.025;
        hPos[i*3+1] += (targets[i].y - hPos[i*3+1])*0.025;
        hPos[i*3+2] += (targets[i].z - hPos[i*3+2])*0.025;
      }
      heartGeo.attributes.position.needsUpdate=true;
    } else {
      phase=2; phaseTimer=0;
    }
  }

  /* PHASE 2: Зүрх эргэлдэх */
  if(phase===2){
    heart.rotation.y += 0.006;
    if(phaseTimer > 500){
      phase=3; phaseTimer=0;
      triggerFlash(800);
      
      document.querySelectorAll('.profile').forEach(el=>el.classList.add('hidden'));
      document.querySelector('.centerText').classList.add('hidden');
      
      for(let i=0;i<COUNT;i++){
        targets[i].x = (Math.random()-0.5)*3000;
        targets[i].y = (Math.random()-0.5)*3000;
        targets[i].z = (Math.random()-0.5)*3000;
      }
      scatterMeshes.forEach(m => m.visible = true);
    }
  }

  /* PHASE 3: Зүрх сарних, Хавтгай зургууд төв рүү цуглах */
  if(phase===3){
    for(let i=0;i<COUNT;i++){
      hPos[i*3+0] += (targets[i].x - hPos[i*3+0])*0.05;
      hPos[i*3+1] += (targets[i].y - hPos[i*3+1])*0.05;
      hPos[i*3+2] += (targets[i].z - hPos[i*3+2])*0.05;
    }
    heartGeo.attributes.position.needsUpdate=true;
    heartMat.opacity = Math.max(0, heartMat.opacity - 0.01);

    scatterMeshes.forEach(m => {
      m.position.lerp(m.userData.targetPos, 0.05);
      m.lookAt(0,0,0);
    });

    if(phaseTimer > 100){
      phase=4; phaseTimer=0;
      heart.visible = false;
    }
  }

  /* PHASE 4: Түр зуурын хавтгайг устгаж, төгс Цул бөмбөрцгийг харуулах */
  if(phase===4){
    scatterMeshes.forEach(m => m.visible = false); // Сарнисан хавтгайнуудыг нууна
    finalSphereMesh.visible = true; // Цул төгс бөмбөрцгийг гаргаж ирнэ
    
    sphereMat.opacity = Math.min(1, sphereMat.opacity + 0.05);
    
    if(phaseTimer === 20){ triggerFlash(400); }
    if(sphereMat.opacity >= 1 && phaseTimer > 40){
      phase=5; phaseTimer=0;
    }
  }

  /* PHASE 5: Яг таг наалдсан, заадасгүй, зөв харсан цул бөмбөрцөг эргэх */
  if(phase===5){
    mainSphereGroup.rotation.y += 0.003;
    mainSphereGroup.rotation.x = Math.sin(Date.now()*0.0002)*0.05;
  }

  stars.rotation.y += 0.0001;
  renderer.render(scene, camera);
}

animate();

/* ---- Хайрцаг нээх ---- */
let opened=false;
document.getElementById("giftContainer").addEventListener("click",()=>{
  if(opened) return;
  opened=true;
  document.getElementById("giftBox").classList.add("open");
  setTimeout(()=>{
    document.getElementById("giftContainer").classList.add("hideGift");
    heart.visible=true;
    formation=0;
    phase=1;
    phaseTimer=0;
  },1000);
});

/* ---- Дэлгэцийн хэмжээ ---- */
window.addEventListener('resize',()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});

</script>
</body>
</html>
